<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{blog/header :: header}"></head>
<body>
<div th:replace="~{blog/header :: navbar}"></div>

<main class="container section-padding">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div th:if="${param.success}" class="alert glass text-accent mb-4">
        Registration successful. Welcome to the collective.
      </div>
      
      <div class="card border-strong bg-surface-raised">
        <div class="mb-4">
          <h2 class="mb-1">Access Request</h2>
          <p class="text-dim small font-mono">// Initialize profile creation</p>
        </div>
        
        <form method="post" role="form" th:action="@{/register/save}" th:object="${user}">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label small text-uppercase tracking-wider">First Name</label>
              <input class="form-control" id="firstName" name="firstName" placeholder="Linus" type="text" th:field="*{firstName}">
              <p th:if="${#fields.hasErrors('firstName')}" class="text-danger small mt-1" th:errors="*{firstName}"></p>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label small text-uppercase tracking-wider">Last Name</label>
              <input class="form-control" id="lastName" name="lastName" placeholder="Torvalds" type="text" th:field="*{lastName}">
              <p th:if="${#fields.hasErrors('lastName')}" class="text-danger small mt-1" th:errors="*{lastName}"></p>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label small text-uppercase tracking-wider">Communication Channel (Email)</label>
            <input class="form-control" id="email" name="email" placeholder="dev@codeblog.dev" type="email" th:field="*{email}">
            <p th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></p>
          </div>
          
          <div class="mb-4">
            <label class="form-label small text-uppercase tracking-wider">Security Token (Password)</label>
            <input class="form-control" id="password" name="password" placeholder="••••••••" type="password" th:field="*{password}">
            <p th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></p>
          </div>
          
          <div class="d-grid gap-3">
            <button type="submit" class="btn btn-primary">Initialize Registration</button>
            <div class="text-center">
              <span class="text-dim small">Already have access? <a th:href="@{/login}" class="text-accent">Login to Console</a></span>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{blog/footer :: footer}"></div>
</body>
</html>
