<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{blog/header :: header}"></head>
<body>
<div th:replace="~{blog/header :: navbar}"></div>

<main class="container section-padding">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div th:if="${param.error}" class="alert glass text-danger mb-4">
        Invalid credentials. Access denied.
      </div>
      <div th:if="${param.logout}" class="alert glass text-accent mb-4">
        Session terminated successfully.
      </div>
      
      <div class="card border-strong bg-surface-raised">
        <div class="mb-4">
          <h2 class="mb-1">Authentication</h2>
          <p class="text-dim small font-mono">// Enter credentials to access console</p>
        </div>
        
        <form method="post" th:action="@{/login}" role="form">
          <div class="mb-3">
            <label class="form-label small text-uppercase tracking-wider">Email Address</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="admin@codeblog.dev">
          </div>
          <div class="mb-4">
            <label class="form-label small text-uppercase tracking-wider">Security Token</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
          </div>
          <div class="d-grid gap-3">
            <button type="submit" class="btn btn-primary">Initialize Login</button>
            <div class="text-center">
              <span class="text-dim small">New operative? <a th:href="@{/register}" class="text-accent">Request Access</a></span>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{blog/footer :: footer}"></div>
</body>
</html>
