<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{blog/header :: header}"></head>
<body>
<div th:replace="~{blog/header :: navbar}"></div>

<main class="container section-padding">
    <div class="row g-5">
        <div class="col-lg-8">
            <div th:each="post : ${postsResponse}" class="card">
                <div class="post-meta" th:text="${#temporals.format(post.createdOn, 'MMM dd, yyyy')}"></div>
                <h2 class="card-title">
                    <a th:href="@{/post/{postUrl}(postUrl=${post.url})}" th:text="${post.title}"></a>
                </h2>
                <div class="card-body">
                    <div class="mb-4 text-secondary" th:utext="${post.shortDescription}"></div>
                    <a class="btn-primary d-inline-flex align-items-center" th:href="@{/post/{postUrl}(postUrl=${post.url})}">
                        Decrypt Post
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ms-2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </a>
                </div>
            </div>
        </div>
        <aside class="col-lg-4">
            <div class="sticky-top" style="top: 100px;">
                <div th:replace="~{blog/search :: search}"></div>
            </div>
        </aside>
    </div>
</main>

<div th:replace="~{blog/footer :: footer}"></div>
</body>
</html>
