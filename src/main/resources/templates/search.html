<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Search Results</title>
</head>
<body>
    <div layout:fragment="content" style="animation: auroraMove 20s infinite alternate linear;">
        <h1 class="author__heading" style="margin-bottom: 60px; font-size: 3rem;">Search Results: <span style="color: var(--accent-cyan);" th:text="${searchTerm}"></span></h1>
        
        <ul class="article-ul">
            <li th:each="post : ${data}">
                <a th:href="@{/post/{id}(id=${post.id})}">
                    <span class="article-list__date" th:text="${#temporals.format(post.createdAt, 'MMM dd, yyyy')}">Date</span>
                    <span th:text="${post.title}">Post Title</span>
                    <p th:text="${#strings.abbreviate(post.body, 120)}"></p>
                </a>
            </li>
        </ul>
        
        <div th:if="${#lists.isEmpty(data)}" style="text-align: center; padding: 120px 0; background: var(--bg-surface); border-radius: 32px; border: 1px dashed var(--glass-border);">
            <i class="bi bi-telescope" style="font-size: 5rem; color: var(--accent-cyan); opacity: 0.3;"></i>
            <p style="margin-top: 32px; font-size: 1.5rem; font-weight: 500; opacity: 0.8;">No signal detected from this sector.</p>
            <p style="opacity: 0.5;">Try different coordinates (keywords).</p>
        </div>
        
        <div style="margin-top: 80px;">
            <a th:href="@{/}" class="pagination-btn" style="display: inline-flex; align-items: center; gap: 12px;">
                <i class="bi bi-rocket-takeoff"></i> Return to Discovery
            </a>
        </div>
    </div>
</body>
</html>
