<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${post.title}">Post</title>
</head>
<body>
    <div layout:fragment="content">
        <article style="max-width: 800px; margin: 0 auto; animation: auroraMove 20s infinite alternate linear;">
            <header style="text-align: center; margin-bottom: 64px;">
                <span class="article-list__date" th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">Date</span>
                <h1 style="font-size: clamp(2.5rem, 6vw, 4rem); margin-top: 20px; line-height: 1.1; font-weight: 700;" th:text="${post.title}">Title</h1>
                <div style="margin-top: 32px; display: flex; justify-content: center; gap: 12px;">
                    <div style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(var(--accent-cyan), var(--accent-violet)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);">N</div>
                    <div style="text-align: left;">
                        <div style="font-weight: 700; font-size: 1rem;">Nova Intelligence</div>
                        <div style="font-size: 0.8rem; opacity: 0.5;">Core Systems Research</div>
                    </div>
                </div>
            </header>
            
            <div class="post-body" style="font-size: 1.25rem; line-height: 1.8; color: var(--text-primary); opacity: 0.9;" th:utext="${post.body}">
                Content
            </div>
            
            <footer style="margin-top: 100px; border-top: 1px solid var(--glass-border); padding-top: 60px; display: flex; justify-content: space-between; align-items: center;">
                <a th:href="@{/}" class="pagination-btn" style="display: flex; align-items: center; gap: 10px;">
                    <i class="bi bi-rocket-takeoff"></i> Back to discovery
                </a>
                <div style="display: flex; gap: 24px; font-size: 1.4rem; opacity: 0.5;">
                    <a href="#"><i class="bi bi-twitter"></i></a>
                    <a href="#"><i class="bi bi-github"></i></a>
                </div>
            </footer>
        </article>
    </div>
</body>
</html>
