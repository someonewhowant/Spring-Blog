<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content" style="animation: auroraMove 20s infinite alternate linear;">
        <div class="admin-header" style="margin-bottom: 64px;">
            <h1 class="author__heading" style="font-size: 3rem;">Command Center</h1>
            <div style="display: flex; gap: 20px;">
                <a th:href="@{/admin/add-post}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Create Expedition
                </a>
                <form th:action="@{/admin/logout}" method="POST" style="margin: 0;">
                    <button type="submit" class="btn btn-outline" style="border-color: var(--accent-pink); color: var(--accent-pink);">
                        <i class="bi bi-power"></i> Terminate Session
                    </button>
                </form>
            </div>
        </div>
        
        <div class="admin-posts" style="display: grid; gap: 20px;">
            <div th:each="post : ${data}" class="admin-post-item" style="background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 32px; border-radius: 24px; backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; transition: all 0.3s var(--transition);" onmouseover="this.style.borderColor='var(--accent-cyan)'; this.style.transform='translateX(10px)'" onmouseout="this.style.borderColor='var(--glass-border)'; this.style.transform='translateX(0)'">
                <div>
                    <span style="font-weight: 700; font-size: 1.4rem; color: var(--text-primary);" th:text="${post.title}">Title</span>
                    <div style="font-size: 0.85rem; color: var(--accent-cyan); margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;" th:text="${#temporals.format(post.createdAt, 'dd MMMM yyyy')}">Date</div>
                </div>
                <div class="admin-actions" style="display: flex; gap: 12px;">
                    <a th:href="@{/admin/edit-post/{id}(id=${post.id})}" class="btn btn-outline" style="border-radius: 12px;">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/admin/delete-post/{id}(id=${post.id})}" 
                       class="btn btn-danger" 
                       style="background: rgba(244, 114, 182, 0.1); color: var(--accent-pink); border: 1px solid rgba(244, 114, 182, 0.2); border-radius: 12px;"
                       onclick="return confirm('Initiate deletion sequence for this entry?')">
                        <i class="bi bi-trash3"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
