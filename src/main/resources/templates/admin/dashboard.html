<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <div style="display: flex; gap: 10px;">
                <a th:href="@{/admin/add-post}" class="btn" style="background: var(--accent-color); color: var(--bg-color);">+ New Post</a>
                <form th:action="@{/admin/logout}" method="POST">
                    <button type="submit" class="btn" style="background: #94a3b8; color: white;">Logout</button>
                </form>
            </div>
        </div>
        
        <div class="admin-posts">
            <div th:each="post : ${data}" class="admin-post-item">
                <div>
                    <span style="font-weight: 700; font-size: 1.1rem;" th:text="${post.title}">Title</span>
                    <p style="font-size: 0.85rem; color: var(--text-muted);" th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy')}"></p>
                </div>
                <div class="admin-actions">
                    <a th:href="@{/admin/edit-post/{id}(id=${post.id})}" class="btn btn-edit">Edit</a>
                    <a th:href="@{/admin/delete-post/{id}(id=${post.id})}" 
                       class="btn btn-delete" 
                       onclick="return confirm('Archive this post?')">Delete</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
