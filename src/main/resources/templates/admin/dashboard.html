<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <div style="display: flex; gap: 16px;">
                <a th:href="@{/admin/add-post}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> New Post
                </a>
                <form th:action="@{/admin/logout}" method="POST" style="margin: 0;">
                    <button type="submit" class="btn btn-outline">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </form>
            </div>
        </div>
        
        <div class="admin-posts">
            <div th:each="post : ${data}" class="admin-post-item">
                <div>
                    <span style="font-weight: 800; font-size: 1.2rem;" th:text="${post.title}">Title</span>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;" th:text="${#temporals.format(post.createdAt, 'dd MMMM yyyy')}"></p>
                </div>
                <div class="admin-actions">
                    <a th:href="@{/admin/edit-post/{id}(id=${post.id})}" class="btn btn-outline">
                        <i class="bi bi-pencil-square"></i> Edit
                    </a>
                    <a th:href="@{/admin/delete-post/{id}(id=${post.id})}" 
                       class="btn btn-danger" 
                       onclick="return confirm('Archive this post?')">
                        <i class="bi bi-trash"></i> Delete
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
