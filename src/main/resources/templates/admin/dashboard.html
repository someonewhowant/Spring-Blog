<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header" style="margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="author__heading" style="font-size: 1.8rem; margin: 0;">root@admin:~/posts$</h1>
            <div style="display: flex; gap: 16px;">
                <a th:href="@{/admin/add-post}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> new_post()
                </a>
                <form th:action="@{/admin/logout}" method="POST" style="margin: 0;">
                    <button type="submit" class="btn btn-outline" style="color: var(--accent-orange); border-color: var(--accent-orange);">
                        <i class="bi bi-power"></i> exit()
                    </button>
                </form>
            </div>
        </div>
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ENTRY_TITLE</th>
                    <th>CREATED_AT</th>
                    <th style="text-align: right;">ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${data}">
                    <td style="font-weight: 600; color: var(--text-main);" th:text="${post.title}">Title</td>
                    <td style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim);" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                    <td style="text-align: right;">
                        <div style="display: flex; gap: 8px; justify-content: flex-end;">
                            <a th:href="@{/admin/edit-post/{id}(id=${post.id})}" class="btn btn-outline" style="padding: 4px 12px;">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/admin/delete-post/{id}(id=${post.id})}" 
                               class="btn btn-outline" 
                               style="padding: 4px 12px; color: var(--accent-orange); border-color: rgba(210, 153, 34, 0.3);"
                               onclick="return confirm('rm -rf this_post?')">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
