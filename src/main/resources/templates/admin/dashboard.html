<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="admin-header">
            <h1 class="admin-title">root@obsidian:~/posts$</h1>
            <div class="admin-actions">
                <a th:href="@{/admin/add-post}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> new_dispatch()
                </a>
                <form th:action="@{/admin/logout}" method="POST">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-power"></i> kill -9
                    </button>
                </form>
            </div>
        </div>
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>DISPATCH_ENTRY</th>
                    <th>TIMESTAMP</th>
                    <th style="text-align: right;">OPERATIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${data}">
                    <td class="admin-table__title" th:text="${post.title}">Title</td>
                    <td class="admin-table__date" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">Date</td>
                    <td style="text-align: right;">
                        <div class="admin-table__actions">
                            <a th:href="@{/admin/edit-post/{id}(id=${post.id})}" class="btn btn-outline">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/admin/delete-post/{id}(id=${post.id})}" 
                               class="btn btn-danger" 
                               onclick="return confirm('rm -rf this_dispatch?')">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
