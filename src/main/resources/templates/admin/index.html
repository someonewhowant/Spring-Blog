<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Admin Login</title>
</head>
<body>
    <div layout:fragment="content" style="max-width: 460px; margin: 0 auto; padding-top: 60px; animation: auroraMove 20s infinite alternate linear;">
        <div style="background: var(--bg-surface); padding: 56px; border-radius: 40px; border: 1px solid var(--glass-border); backdrop-filter: blur(40px); box-shadow: 0 40px 100px rgba(0,0,0,0.6);">
            <div style="text-align: center; margin-bottom: 48px;">
                <div class="header__logo" style="font-size: 2.5rem; margin-bottom: 8px;">NOVA</div>
                <h1 style="font-size: 1.25rem; font-weight: 500; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase;">Command Portal</h1>
            </div>
            
            <div th:if="${param.error}" style="background: rgba(244, 114, 182, 0.1); color: var(--accent-pink); padding: 14px; border-radius: 16px; margin-bottom: 32px; font-size: 0.95rem; text-align: center; border: 1px solid rgba(244, 114, 182, 0.2);">
                <i class="bi bi-shield-lock"></i> Verification failed.
            </div>

            <form th:action="@{/admin/login}" method="POST" style="display: flex; flex-direction: column; gap: 24px;">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label style="color: var(--accent-cyan); font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase;">Identifier</label>
                    <input type="text" name="username" placeholder="Username" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; outline: none;" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label style="color: var(--accent-violet); font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase;">Access Key</label>
                    <input type="password" name="password" placeholder="••••••••" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; outline: none;" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; justify-content: center; height: 52px; font-size: 1rem; letter-spacing: 0.05em;">
                    Initialize Access
                </button>
            </form>
            
            <div style="margin-top: 40px; text-align: center;">
                <a th:href="@{/}" style="font-size: 0.95rem; opacity: 0.4; font-weight: 500; transition: opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.4'">
                    &larr; Return to Surface
                </a>
            </div>
        </div>
    </div>
</body>
</html>
