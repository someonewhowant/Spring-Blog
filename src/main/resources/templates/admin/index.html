<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Admin Login</title>
</head>
<body>
    <div layout:fragment="content" style="max-width: 400px; margin: 0 auto; padding-top: 50px;">
        <div style="background: var(--card-bg); padding: 40px; border-radius: var(--border-radius); border: 1px solid var(--border-color); box-shadow: var(--shadow-md);">
            <h1 style="text-align: center; margin-bottom: 30px;">Login</h1>
            
            <div th:if="${param.error}" style="background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                Invalid username or password.
            </div>

            <form th:action="@{/admin/login}" method="POST">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 30px; background: var(--accent-color); color: var(--bg-color);">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
