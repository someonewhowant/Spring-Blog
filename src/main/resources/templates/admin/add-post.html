<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Add New Post</title>
</head>
<body>
    <div layout:fragment="content" style="max-width: 800px; margin: 0 auto; animation: fadeInUp 0.8s ease-out;">
        <div class="admin-header">
            <h1>Create New Insight</h1>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline">
                <i class="bi bi-x-lg"></i> Cancel
            </a>
        </div>
        
        <div style="background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--border-color);">
            <form th:action="@{/admin/add-post}" method="POST">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="title">Post Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g. The Future of Quantum Computing" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="body">Content (Markdown supported)</label>
                    <textarea id="body" name="body" rows="15" placeholder="Write your thoughts here..." required></textarea>
                </div>
                <div style="display: flex; gap: 16px; margin-top: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex-grow: 1; justify-content: center;">
                        <i class="bi bi-check-lg"></i> Publish Post
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
