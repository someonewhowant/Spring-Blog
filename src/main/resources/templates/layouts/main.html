<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE" th:text="${title}">Blog</title>
    <meta name="description" th:content="${description}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container">
        <!-- Header Partial -->
        <header th:replace="~{partials/header :: header}"></header>

        <main class="main" layout:fragment="content">
            <!-- Сюда будет вставляться контент из других файлов -->
        </main>

        <!-- Footer Partial -->
        <footer th:replace="~{partials/footer :: footer}"></footer>
    </div>

    <script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
