<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Edit Post</title>
</head>
<body>
    <div layout:fragment="content">
        <h1>Edit Post</h1>
        <form th:action="@{/admin/edit-post/{id}(id=${post.id})}" method="POST">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" th:value="${post.title}" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="body">Content</label>
                <textarea id="body" name="body" th:text="${post.body}" class="form-control" rows="10" required></textarea>
            </div>
            <button type="submit" class="btn">Update Post</button>
            <a th:href="@{/admin/dashboard}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
