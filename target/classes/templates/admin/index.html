<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Admin Login</title>
</head>
<body>
    <div layout:fragment="content" style="max-width: 460px; margin: 0 auto; padding-top: 60px;">
        <div style="background: var(--bg-surface); padding: 56px; border-radius: var(--radius); border: 1px solid var(--border-subtle);">
            <div style="text-align: center; margin-bottom: 48px;">
                <div class="header__logo" style="font-size: 2.5rem; margin-bottom: 8px;"><span>{</span> code_blog <span>}</span></div>
                <h1 style="font-family: var(--font-mono); font-size: 1rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em;">$ sudo authenticate</h1>
            </div>
            
            <div th:if="${param.error}" style="background: rgba(210, 153, 34, 0.1); color: var(--accent-orange); padding: 14px; border-radius: var(--radius); margin-bottom: 32px; font-size: 0.85rem; font-family: var(--font-mono); text-align: center; border: 1px solid rgba(210, 153, 34, 0.2);">
                ERROR: Authentication failed. Incorrect credentials.
            </div>

            <form th:action="@{/admin/login}" method="POST" style="display: flex; flex-direction: column; gap: 24px;">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label style="color: var(--accent-blue); font-family: var(--font-mono); font-size: 0.8rem;">// USERNAME</label>
                    <input type="text" name="username" placeholder="user" style="background: var(--bg-dark); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 14px; border-radius: var(--radius); font-family: var(--font-mono); outline: none;" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label style="color: var(--accent-purple); font-family: var(--font-mono); font-size: 0.8rem;">// ACCESS_KEY</label>
                    <input type="password" name="password" placeholder="••••••••" style="background: var(--bg-dark); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 14px; border-radius: var(--radius); font-family: var(--font-mono); outline: none;" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; justify-content: center; height: 52px; font-size: 1rem;">
                    init_session()
                </button>
            </form>
            
            <div style="margin-top: 40px; text-align: center;">
                <a th:href="@{/}" style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-dim); transition: color 0.3s;">
                    &lt;-- back_to_home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
